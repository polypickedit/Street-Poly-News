    <script>
      // Defensive guard against brittle third-party scripts (e.g. h1-check.js)
      if (typeof window !== 'undefined') {
        // Ensure detectStore exists and always returns a promise to avoid ".then is undefined" errors
        let originalDetectStore = window.detectStore;
        Object.defineProperty(window, 'detectStore', {
          get: function() {
            return function() {
              try {
                const result = typeof originalDetectStore === 'function' 
                  ? originalDetectStore.apply(this, arguments) 
                  : undefined;
                
                if (result && typeof result.then === 'function') {
                  return result;
                }
                return Promise.resolve(result || {});
              } catch (e) {
                console.warn('[Guard] detectStore failed, returning fallback promise', e);
                return Promise.resolve({});
              }
            };
          },
          set: function(val) {
            originalDetectStore = val;
          },
          configurable: true
        });
      }
    </script>
