name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPECTED_SUPABASE_PROJECT_REF: cjodbnsjggslngnzwxsv
      VITE_SUPABASE_URL: https://cjodbnsjggslngnzwxsv.supabase.co
      VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-anon-key
      VITE_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
      VITE_CANONICAL_HOST: streetpolynews.com
      VITE_CANONICAL_PROTOCOL: https
      STRIPE_WEBHOOK_URL: https://cjodbnsjggslngnzwxsv.functions.supabase.co/stripe-webhook
      FORCE_PRODUCTION_GUARD: "1"

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Block TODOs in runtime code
      shell: bash
      run: |
        if grep -R "TODO:" src/components src/hooks src/pages; then
          echo "TODOs found in runtime code"
          exit 1
        fi
        
    - name: Lint
      run: npm run lint

    - name: Typecheck
      run: npm run typecheck

    - name: Release invariants
      run: npm run validate:release

    - name: Unit tests
      run: npm run test:unit

    - name: Integration tests
      run: npm run test:integration
      
    - name: Build
      run: npm run build
